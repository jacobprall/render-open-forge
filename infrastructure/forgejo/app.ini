; render-open-forge Forgejo configuration
; Environment variables override these settings via FORGEJO__SECTION__KEY format

[server]
APP_NAME = render-open-forge
DOMAIN = localhost
ROOT_URL = http://localhost:3000
HTTP_PORT = 3000
SSH_PORT = 22
DISABLE_SSH = false
LFS_START_SERVER = true

[database]
DB_TYPE = postgres

[service]
DISABLE_REGISTRATION = false
ENABLE_NOTIFY_MAIL = false
REQUIRE_SIGNIN_VIEW = false
DEFAULT_ALLOW_CREATE_ORGANIZATION = true
DEFAULT_ENABLE_TIMETRACKING = false

[oauth2]
ENABLE = true

[actions]
ENABLED = true
DEFAULT_ACTIONS_URL = https://code.forgejo.org

[api]
ENABLE_SWAGGER = true
MAX_RESPONSE_ITEMS = 100

[repository]
DEFAULT_BRANCH = main
ENABLE_PUSH_CREATE_USER = true
ENABLE_PUSH_CREATE_ORG = true

[ui]
DEFAULT_THEME = forgejo-auto

[log]
MODE = console
LEVEL = info

[security]
INSTALL_LOCK = true
