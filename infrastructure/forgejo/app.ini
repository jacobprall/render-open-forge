; render-open-forge Forgejo configuration
; Environment variables override these settings via FORGEJO__SECTION__KEY format

[server]
APP_NAME = render-open-forge
DOMAIN = localhost
ROOT_URL = http://localhost:3000
HTTP_PORT = 3000
SSH_PORT = 22
DISABLE_SSH = false
LFS_START_SERVER = true

[database]
DB_TYPE = postgres

[service]
DISABLE_REGISTRATION = false
ENABLE_NOTIFY_MAIL = false
REQUIRE_SIGNIN_VIEW = false
DEFAULT_ALLOW_CREATE_ORGANIZATION = true
DEFAULT_ENABLE_TIMETRACKING = false

[oauth2]
ENABLE = true

[actions]
ENABLED = true
DEFAULT_ACTIONS_URL = https://code.forgejo.org

[api]
ENABLE_SWAGGER = true
MAX_RESPONSE_ITEMS = 100

[repository]
DEFAULT_BRANCH = main
ENABLE_PUSH_CREATE_USER = true
ENABLE_PUSH_CREATE_ORG = true

[ui]
DEFAULT_THEME = forgejo-auto

[log]
MODE = console
LEVEL = info

[security]
INSTALL_LOCK = true

; --- Object storage ---
; Forgejo routes LFS, attachments, avatars, packages, and repo-archives
; through a unified [storage] backend. The settings below are overridden at
; runtime by FORGEJO__storage__* environment variables (see docker-compose.yml
; and render.yaml). Uncomment to bake defaults into the image instead.
;
; [storage]
; STORAGE_TYPE = minio
; MINIO_ENDPOINT = minio:9000
; MINIO_ACCESS_KEY_ID = minioadmin
; MINIO_SECRET_ACCESS_KEY = minioadmin
; MINIO_BUCKET = forgejo
; MINIO_LOCATION = us-east-1
; MINIO_USE_SSL = false
;
; To use AWS S3 directly instead of MinIO, set:
;   STORAGE_TYPE = minio          (Forgejo uses the same driver for any S3-compatible endpoint)
;   MINIO_ENDPOINT = s3.amazonaws.com
;   MINIO_USE_SSL = true
;   MINIO_BUCKET = your-bucket
;   ...and supply IAM credentials via MINIO_ACCESS_KEY_ID / MINIO_SECRET_ACCESS_KEY
;
; Per-subsystem overrides (optional):
;   [lfs]           STORAGE_TYPE = ...
;   [attachment]    STORAGE_TYPE = ...
;   [avatar]        STORAGE_TYPE = ...
;   [packages]      STORAGE_TYPE = ...
;   [repo-archive]  STORAGE_TYPE = ...
