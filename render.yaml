services:
  # Web Application (Next.js)
  - type: web
    name: forge-web
    runtime: node
    plan: starter
    buildCommand: bun install && npx turbo build --filter=web
    startCommand: cd apps/web && bun run start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: forge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: forge-redis
          type: keyvalue
          property: connectionString
      - key: FORGEJO_INTERNAL_URL
        value: http://forge-forgejo:3000
      - key: FORGEJO_EXTERNAL_URL
        sync: false
      - key: FORGEJO_OAUTH_CLIENT_ID
        sync: false
      - key: FORGEJO_OAUTH_CLIENT_SECRET
        sync: false
      - key: FORGEJO_AGENT_TOKEN
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_CI_WORKFLOW_SLUG
        value: forge-ci
      - key: CI_RUNNER_SECRET
        generateValue: true # forge-ci reads the same value via fromService.envVarKey
      - key: CI_CALLBACK_URL
        sync: false
      - key: NODE_ENV
        value: production

  # Agent Worker
  - type: worker
    name: forge-agent
    runtime: node
    plan: starter
    buildCommand: bun install && npx turbo build --filter=agent
    startCommand: cd apps/agent && bun run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: forge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: forge-redis
          type: keyvalue
          property: connectionString
      - key: FORGEJO_INTERNAL_URL
        value: http://forge-forgejo:3000
      - key: FORGEJO_AGENT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        fromService:
          name: forge-web
          type: web
          envVarKey: ENCRYPTION_KEY
      - key: SANDBOX_SERVICE_HOST
        value: forge-sandbox:3001
      - key: SANDBOX_SHARED_SECRET
        generateValue: true
      - key: SANDBOX_SESSION_SECRET
        generateValue: true

  # Sandbox (isolated execution environment)
  - type: web
    name: forge-sandbox
    runtime: docker
    plan: standard
    dockerfilePath: packages/sandbox/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    disk:
      name: sandbox-workspace
      mountPath: /workspace
      sizeGB: 20
    envVars:
      - key: PORT
        value: "3001"
      - key: WORKSPACE_ROOT
        value: /workspace
      - key: SANDBOX_SHARED_SECRET
        generateValue: true
      - key: SANDBOX_SESSION_SECRET
        generateValue: true

  # Forgejo (Internal Forge)
  - type: web
    name: forge-forgejo
    runtime: docker
    plan: standard
    dockerfilePath: infrastructure/forgejo/Dockerfile
    dockerContext: infrastructure/forgejo
    healthCheckPath: /api/v1/version
    disk:
      name: forgejo-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: FORGEJO__database__DB_TYPE
        value: postgres
      - key: FORGEJO__database__HOST
        fromDatabase:
          name: forge-db
          property: host
      - key: FORGEJO__database__NAME
        fromDatabase:
          name: forge-db
          property: database
      - key: FORGEJO__database__USER
        fromDatabase:
          name: forge-db
          property: user
      - key: FORGEJO__database__PASSWD
        fromDatabase:
          name: forge-db
          property: password
      - key: FORGEJO__server__ROOT_URL
        sync: false
      - key: FORGEJO__oauth2__JWT_SECRET
        generateValue: true
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false

  # CI Runner (Render Workflows)
  # Note: Render Workflows doesn't yet support Blueprint definitions.
  # Deploy this as a worker that registers tasks with the Render SDK.
  # Once Workflows supports Blueprints, switch to type: workflow.
  - type: worker
    name: forge-ci
    runtime: node
    plan: starter
    buildCommand: bun install && npx turbo build --filter=ci-runner
    startCommand: cd apps/ci-runner && bun run start
    envVars:
      - key: FORGEJO_INTERNAL_URL
        value: http://forge-forgejo:3000
      - key: FORGEJO_AGENT_TOKEN
        sync: false
      - key: CI_RUNNER_SECRET
        fromService:
          name: forge-web
          type: web
          envVarKey: CI_RUNNER_SECRET

  # Redis (job queue + streaming)
  - type: keyvalue
    name: forge-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: forge-db
    plan: basic-256mb
    postgresMajorVersion: "16"

previews:
  generation: manual
