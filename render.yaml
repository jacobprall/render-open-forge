services:
  # Web Application (Next.js)
  - type: web
    name: openforge-web
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: bun install && npx turbo build --filter=@openforge/web
    startCommand: cd apps/web && bun run start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: openforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: openforge-redis
          type: keyvalue
          property: connectionString
      # GitHub OAuth (primary forge provider)
      - key: GITHUB_OAUTH_CLIENT_ID
        sync: false
      - key: GITHUB_OAUTH_CLIENT_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      # Forgejo (optional — only needed if using self-hosted git)
      - key: FORGEJO_INTERNAL_URL
        sync: false
      - key: FORGEJO_EXTERNAL_URL
        sync: false
      - key: FORGEJO_OAUTH_CLIENT_ID
        sync: false
      - key: FORGEJO_OAUTH_CLIENT_SECRET
        sync: false
      - key: FORGEJO_AGENT_TOKEN
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GATEWAY_INTERNAL_URL
        value: http://openforge-gateway:4100
      - key: GATEWAY_API_SECRET
        fromService:
          name: openforge-gateway
          type: web
          envVarKey: GATEWAY_API_SECRET
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_WEBHOOK_SECRET
        sync: false
      - key: CI_RUNNER_SECRET
        generateValue: true # use same value in GitHub Actions (or other callers) for POST /api/ci/results
      - key: CI_CALLBACK_URL
        sync: false
      - key: NODE_ENV
        value: production

  # Agent Worker
  - type: worker
    name: openforge-agent
    runtime: node
    plan: starter
    autoDeploy: false
    buildCommand: bun install && npx turbo build --filter=@openforge/agent
    startCommand: cd apps/agent && bun run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: openforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: openforge-redis
          type: keyvalue
          property: connectionString
      # GitHub
      - key: GITHUB_TOKEN
        sync: false
      # Forgejo (optional — only needed if using self-hosted git)
      - key: FORGEJO_INTERNAL_URL
        sync: false
      - key: FORGEJO_SANDBOX_URL
        sync: false
      - key: FORGEJO_AGENT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_OWNER_ID
        sync: false
      - key: ENCRYPTION_KEY
        fromService:
          name: openforge-web
          type: web
          envVarKey: ENCRYPTION_KEY
      - key: SANDBOX_SERVICE_HOST
        value: openforge-sandbox:3001
      - key: SANDBOX_SHARED_SECRET
        fromService:
          name: openforge-sandbox
          type: web
          envVarKey: SANDBOX_SHARED_SECRET
      - key: SANDBOX_SESSION_SECRET
        fromService:
          name: openforge-sandbox
          type: web
          envVarKey: SANDBOX_SESSION_SECRET

  # Sandbox (isolated execution environment)
  - type: web
    name: openforge-sandbox
    runtime: docker
    plan: standard
    autoDeploy: false
    dockerfilePath: packages/sandbox/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    disk:
      name: sandbox-workspace
      mountPath: /workspace
      sizeGB: 20
    envVars:
      - key: PORT
        value: "3001"
      - key: WORKSPACE_ROOT
        value: /workspace
      - key: SANDBOX_SHARED_SECRET
        generateValue: true
      - key: SANDBOX_SESSION_SECRET
        generateValue: true

  # Gateway (headless REST + MCP API)
  - type: web
    name: openforge-gateway
    runtime: docker
    plan: starter
    autoDeploy: false
    dockerfilePath: apps/gateway/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: openforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: openforge-redis
          type: keyvalue
          property: connectionString
      - key: GATEWAY_API_SECRET
        generateValue: true
      # GitHub
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      # Forgejo (optional — only needed if using self-hosted git)
      - key: FORGEJO_INTERNAL_URL
        sync: false
      - key: FORGEJO_AGENT_TOKEN
        sync: false
      - key: FORGEJO_WEBHOOK_SECRET
        sync: false
      - key: CI_RUNNER_SECRET
        fromService:
          name: openforge-web
          type: web
          envVarKey: CI_RUNNER_SECRET
      - key: ENCRYPTION_KEY
        fromService:
          name: openforge-web
          type: web
          envVarKey: ENCRYPTION_KEY
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GATEWAY_PORT
        value: "4100"
      - key: NODE_ENV
        value: production

  # Redis (job queue + streaming)
  - type: keyvalue
    name: openforge-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: openforge-db
    plan: basic-256mb
    postgresMajorVersion: "16"