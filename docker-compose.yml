services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/forgejo &&
      echo 'Bucket forgejo created'
      "
    restart: "no"

  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    environment:
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=postgres:5432
      - FORGEJO__database__NAME=forge
      - FORGEJO__database__USER=forge
      - FORGEJO__database__PASSWD=forge
      - FORGEJO__server__ROOT_URL=http://localhost:3000
      - FORGEJO__server__HTTP_PORT=3000
      - FORGEJO__server__DOMAIN=localhost
      - FORGEJO__service__DISABLE_REGISTRATION=false
      - FORGEJO__service__ENABLE_NOTIFY_MAIL=false
      - FORGEJO__actions__ENABLED=true
      - FORGEJO__api__ENABLE_SWAGGER=true
      - FORGEJO__oauth2__ENABLE=true
      - FORGEJO__oauth2__JWT_SECRET=dev-jwt-secret-change-in-production
      # Object storage — route LFS, attachments, avatars, packages, repo-archives to MinIO
      - FORGEJO__storage__STORAGE_TYPE=minio
      - FORGEJO__storage__MINIO_ENDPOINT=minio:9000
      - FORGEJO__storage__MINIO_ACCESS_KEY_ID=minioadmin
      - FORGEJO__storage__MINIO_SECRET_ACCESS_KEY=minioadmin
      - FORGEJO__storage__MINIO_BUCKET=forgejo
      - FORGEJO__storage__MINIO_LOCATION=us-east-1
      - FORGEJO__storage__MINIO_USE_SSL=false
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - forgejo-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sandbox:
    build:
      context: .
      dockerfile: packages/sandbox/Dockerfile
    environment:
      - PORT=3001
      - WORKSPACE_ROOT=/workspace
      - SANDBOX_SHARED_SECRET=dev-sandbox-secret
      - SANDBOX_SESSION_SECRET=dev-session-secret
      - SANDBOX_GIT_USER_NAME=Forge Agent
      - SANDBOX_GIT_USER_EMAIL=agent@render-open-forge.dev
    ports:
      - "3001:3001"
    volumes:
      - sandbox-data:/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  forgejo-data:
  minio-data:
  sandbox-data:
