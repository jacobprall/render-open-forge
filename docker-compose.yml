services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  sandbox:
    build:
      context: .
      dockerfile: packages/sandbox/Dockerfile
    environment:
      - PORT=3001
      - WORKSPACE_ROOT=/workspace
      - SANDBOX_SHARED_SECRET=dev-sandbox-secret
      - SANDBOX_SESSION_SECRET=dev-session-secret
      - SANDBOX_GIT_USER_NAME=Forge Agent
      - SANDBOX_GIT_USER_EMAIL=agent@openforge.dev
    ports:
      - "3001:3001"
    volumes:
      - sandbox-data:/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  sandbox-data:
